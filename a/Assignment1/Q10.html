<!DOCTYPE html>
<html lang="en">
<head>
</head>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<body ng-app="mainApp" ng-controller="mainController" ng-init="data = { university:
    'Indus University', course: 'MCA' }">
     <div class="main">
     <p>University - > <span ng-bind="data.university"></span></p>
     <p>Course - > <span ng-bind="data.course"></span></p>
     </div></body>
     <script>
     var app = angular.module('mainApp', []);
     app.controller('mainController', function ($scope) {
     $scope.data = {
     university: 'Indus University',
     course: 'MCA'
    }
});
</script>

</html>
