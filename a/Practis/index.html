<!DOCTYPE html>
<html lang="en">
<head>
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    
</head>
<body ng-app="myApp" ng-controller="myController">
    <div class="fcontainer" ng-show="Form">

            <form >
                <table>

                    <tr>
                        <td>Name:</td>
                        <td><input type="text" ng-model="Pname"></td>
                    </tr>

                    <tr>
                        <td>City:</td>
                        <td><input type="text" ng-model="Pcity"></td>
                    </tr>
                    <tr>
                        <td>Age:</td>
                        <td><input type="number" ng-model="Page"></td>
                    </tr>

                    <tr>
                        <td>Gender:</td>
                        <td><input type="radio" ng-model="pgender" name="gender" value="male">Male
                        <input type="radio" ng-model="pgender" name="gender" value="female">Female</td>
                    </tr>

                    <tr>
                        <td>Email:</td>
                        <td><input type="email" ng-model="Pemail"></td>
                    </tr>

                    <tr>
                        <td>Choose-Date:</td>
                        <td><input type="date" ng-model="Pdate"></td>
                    </tr>
                    <tr>
                        <td><button type="submit" ng-click="booking()">Book Now</button></td>
                        <td><button type="reset" >Reset</button></td>
                    </tr>

                </table>
            </form>
    </div>

    <div class="E-ticket" ng-show="Ticket">
    <form >
        <table>
            <tr>
                <td>Passanger-Name:</td>
                <td>{{Pname}}</td>
            </tr>
            <tr>
                <td>Passanger-City:</td>
                <td>{{Pcity}}</td>
            </tr>
            <tr>
                <td>Passanger-Age:</td>
                <td>{{Page}}</td>
            </tr>
            <tr>
                <td>Passanger-Gender:</td>
                <td>{{pgender}}</td>
            </tr>
            <tr>
                <td>Passanger-Email:</td>
                <td>{{Pemail}}</td>
            </tr>
            <tr>
                <td>Passanger-Date:</td>
                <td>{{Pdate | date:'yyyy-mm-dd'}}</td>
            </tr>
            <tr>
                    <td><button ng-click="goback()">Back</button></td>
            </tr>
        </table>
    </form>   
       
    </div>


</body>

<script>
    var app = angular.module('myApp',[]);
    app.controller('myController',function ($scope){
      $scope.Ticket=false;
      $scope.Form=true;

      $scope.booking=function(){
        $scope.Ticket=true;
        $scope.Form=false;
      }
      $scope.goback=function(){
        $scope.Ticket=false;
        $scope.Form=true;
      }
    
  
    });
</script>
</html>
